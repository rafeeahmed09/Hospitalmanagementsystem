spring:
  application:
    name: hospital-management-system

  datasource:
    url: jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true
    username: root
    password: 1234567890
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      continue-on-error: true

  jackson:
    mapper:
      accept-case-insensitive-enums: true

server:
  port: ${SERVER_PORT:8081}

security:
  jwt:

    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    issuer: ${JWT_ISSUER:api.substring.com}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:86400}
    refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
    cookie-http-only: ${JWT_COOKIE_HTTP_ONLY:true}
    cookie-secure: ${JWT_COOKIE_SECURE:false}
    cookie-domain: ${JWT_COOKIE_DOMAIN:localhost}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:Lax}